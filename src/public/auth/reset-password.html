<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Reset Password - Postaway</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
		<div class="w-full max-w-md bg-white rounded-xl border border-gray-100 shadow-sm p-8">
			<h1 class="text-2xl font-bold text-gray-900 mb-2">Reset Password</h1>
			<p class="text-gray-500 mb-6">Follow the steps to reset your password</p>

			<div class="flex gap-2 mb-6 text-xs">
				<span id="step-1" class="flex-1 text-center py-2 rounded-lg bg-indigo-600 text-white">1. Email</span>
				<span id="step-2" class="flex-1 text-center py-2 rounded-lg bg-gray-100 text-gray-500">2. OTP</span>
				<span id="step-3" class="flex-1 text-center py-2 rounded-lg bg-gray-100 text-gray-500">3. Password</span>
			</div>

			<form id="reset-step-1" class="space-y-4">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
					<input type="email" name="email" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
				</div>
				<button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700">Send OTP</button>
			</form>

			<form id="reset-step-2" class="space-y-4 hidden">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">OTP</label>
					<input type="text" name="otp" required class="w-full border border-gray-300 rounded-lg px-3 py-2">
				</div>
				<button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700">Verify OTP</button>
			</form>

			<form id="reset-step-3" class="space-y-4 hidden">
				<div>
					<label class="block text-sm font-medium text-gray-700 mb-1">New Password</label>
					<input type="password" name="password" required minlength="8" class="w-full border border-gray-300 rounded-lg px-3 py-2">
				</div>
				<button type="submit" class="w-full bg-indigo-600 text-white py-2.5 rounded-lg hover:bg-indigo-700">Reset Password</button>
			</form>

			<p class="mt-6 text-sm text-center">
				<a href="/auth/login.html" class="text-indigo-600 hover:underline">Back to login</a>
			</p>
		</div>

		<script src="/js/utils.js"></script>
		<script src="/js/api.js"></script>
		<script src="/js/auth.js"></script>
		<script src="/js/ui.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", () => {
				let email = "";

				function setStep(step) {
					document.getElementById("reset-step-1").classList.toggle("hidden", step !== 1);
					document.getElementById("reset-step-2").classList.toggle("hidden", step !== 2);
					document.getElementById("reset-step-3").classList.toggle("hidden", step !== 3);

					for (let i = 1; i <= 3; i += 1) {
						const el = document.getElementById(`step-${i}`);
						el.className =
							i === step
								? "flex-1 text-center py-2 rounded-lg bg-indigo-600 text-white"
								: "flex-1 text-center py-2 rounded-lg bg-gray-100 text-gray-500";
					}
				}

				document.getElementById("reset-step-1").addEventListener("submit", async (event) => {
					event.preventDefault();
					email = event.target.email.value.trim();
					try {
						await API.post("/api/otp/send", { email }, { skipAuthRedirect: true });
						UI.toast("OTP sent to your email", "success");
						setStep(2);
					} catch (error) {
						UI.toast(error.message, "error");
					}
				});

				document.getElementById("reset-step-2").addEventListener("submit", async (event) => {
					event.preventDefault();
					const otp = event.target.otp.value.trim();
					try {
						await API.post("/api/otp/verify", { email, otp }, { skipAuthRedirect: true });
						UI.toast("OTP verified", "success");
						setStep(3);
					} catch (error) {
						UI.toast(error.message, "error");
					}
				});

				document.getElementById("reset-step-3").addEventListener("submit", async (event) => {
					event.preventDefault();
					const password = event.target.password.value;
					try {
						await API.post("/api/otp/reset-password", { email, password });
						UI.toast("Password reset successful", "success");
						setTimeout(() => {
							window.location.href = "/auth/login.html";
						}, 1200);
					} catch (error) {
						UI.toast(error.message, "error");
					}
				});
			});
		</script>
	</body>
</html>
