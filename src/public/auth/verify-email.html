<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Verify Email - Postaway</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-gray-50 min-h-screen flex items-center justify-center px-4">
		<div class="w-full max-w-md bg-white rounded-xl border border-gray-100 shadow-sm p-8 text-center">
			<h1 class="text-2xl font-bold text-gray-900 mb-2">Email Verification</h1>
			<p id="verify-status" class="text-gray-500 mb-6">Verifying your email...</p>
			<a href="/auth/login.html" class="inline-flex bg-indigo-600 text-white px-5 py-2.5 rounded-lg hover:bg-indigo-700">Go to Login</a>
		</div>

		<script src="/js/utils.js"></script>
		<script src="/js/api.js"></script>
		<script src="/js/auth.js"></script>
		<script src="/js/ui.js"></script>
		<script>
			document.addEventListener("DOMContentLoaded", async () => {
				const status = document.getElementById("verify-status");
				const token = getQueryParam("token");

				if (!token) {
					status.textContent = "Missing verification token.";
					status.classList.add("text-red-500");
					return;
				}

				try {
					await API.get(`/api/users/verify-email?token=${encodeURIComponent(token)}`, {
						skipAuthRedirect: true,
					});
					status.textContent = "Email verified successfully! You can now log in.";
					status.classList.add("text-green-600");
				} catch (error) {
					status.textContent = error.message;
					status.classList.add("text-red-500");
				}
			});
		</script>
	</body>
</html>
