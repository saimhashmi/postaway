<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Friends - Postaway</title>
		<script src="https://cdn.tailwindcss.com"></script>
	</head>
	<body class="bg-gray-50 min-h-screen">
		<div id="navbar-slot"></div>

		<main class="max-w-3xl mx-auto px-4 py-6">
			<h1 class="text-2xl font-bold text-gray-900 mb-6">Friends</h1>

			<div class="flex gap-2 mb-6">
				<button id="tab-friends" type="button" class="px-4 py-2 rounded-lg bg-indigo-600 text-white text-sm">Friends</button>
				<button id="tab-requests" type="button" class="px-4 py-2 rounded-lg bg-gray-100 text-gray-600 text-sm">Requests</button>
			</div>

			<div id="friends-panel" class="space-y-3">
				<div id="friends-list"></div>
			</div>

			<div id="requests-panel" class="hidden space-y-3">
				<div id="requests-list"></div>
			</div>
		</main>

		<script src="/js/utils.js"></script>
		<script src="/js/api.js"></script>
		<script src="/js/auth.js"></script>
		<script src="/js/ui.js"></script>
		<script src="/js/router.js"></script>
		<script src="/js/friends.js"></script>
	</body>
</html>
